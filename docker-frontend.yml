name: frontend-ci

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install dependencies
      run: npm install

    - name: Build frontend
      run: npm run build

    # Docker login
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Build Docker image
    - name: Build Docker Image
      run: docker build -t sakthimeera07/ideasync-frontend:latest .

    # Push Docker image
    - name: Push Docker Image
      run: docker push sakthimeera07/ideasync-frontend:latest
